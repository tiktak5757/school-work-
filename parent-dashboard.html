<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👨‍👩‍👧 Parent Dashboard – Live</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#F0F4FF;color:#2C3E50;min-height:100vh;}
header{background:linear-gradient(135deg,#11998e,#38ef7d);color:white;padding:20px 16px;text-align:center;}
header h1{font-family:'Fredoka One',cursive;font-size:1.8rem;}
header p{font-size:.9rem;opacity:.9;margin-top:4px;}
.live-dot{display:inline-block;width:12px;height:12px;background:#fff;border-radius:50%;margin-right:6px;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
#status-bar{background:white;padding:10px 16px;text-align:center;font-weight:800;font-size:.9rem;border-bottom:3px solid #EEE;color:#667eea;}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px;max-width:800px;margin:0 auto;}
.score-box{background:white;border-radius:14px;padding:20px 10px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.08);}
.score-box .label{font-size:.8rem;font-weight:800;opacity:.5;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.score-box .num{font-family:'Fredoka One',cursive;font-size:2rem;}
.score-box.eng{border-top:5px solid #FF6B9D;}
.score-box.mat{border-top:5px solid #4D96FF;}
.score-box.clk{border-top:5px solid #6BCB77;}
.score-box.tot{border-top:5px solid #764ba2;}
.progress-bar{height:10px;background:#EEE;border-radius:10px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:10px;transition:width .5s;}
.eng .progress-fill{background:#FF6B9D;}
.mat .progress-fill{background:#4D96FF;}
.clk .progress-fill{background:#6BCB77;}
.tot .progress-fill{background:#764ba2;}
#answers-section{max-width:800px;margin:0 auto;padding:0 16px 40px;}
.section-head{font-family:'Fredoka One',cursive;font-size:1.3rem;margin:20px 0 10px;padding-bottom:6px;border-bottom:3px solid #EEE;}
.a-card{background:white;border-radius:10px;padding:14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:5px solid #ddd;display:flex;align-items:flex-start;gap:12px;}
.a-card.correct{border-left-color:#6BCB77;background:#F0FFF4;}
.a-card.wrong{border-left-color:#FF4757;background:#FFF5F5;}
.a-icon{font-size:1.4rem;min-width:28px;}
.a-body{flex:1;}
.a-label{font-size:.68rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:.4;margin-bottom:3px;}
.a-q{font-weight:700;font-size:.9rem;margin-bottom:4px;}
.a-ans{font-size:.88rem;}
.a-ans span{font-weight:800;}
.empty{text-align:center;padding:40px;color:#aaa;font-weight:700;}
#last-updated{text-align:center;font-size:.8rem;color:#aaa;padding:10px;font-weight:700;}
.filter-tabs{display:flex;gap:8px;padding:12px 16px;max-width:800px;margin:0 auto;flex-wrap:wrap;}
.ftab{padding:8px 16px;border-radius:50px;border:2px solid #ddd;background:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;}
.ftab.active{background:#667eea;color:white;border-color:#667eea;}
</style>
</head>
<body>
<header>
  <h1><span class="live-dot"></span>Parent Live Dashboard</h1>
  <p>See your child's answers in real time as they answer each question</p>
</header>
<div id="status-bar">🔴 Connecting to Firebase...</div>

<div class="score-grid">
  <div class="score-box eng">
    <div class="label">📖 English</div>
    <div class="num" id="eng-num">0/0</div>
    <div class="progress-bar"><div class="progress-fill" id="eng-bar" style="width:0%"></div></div>
  </div>
  <div class="score-box mat">
    <div class="label">🔢 Maths</div>
    <div class="num" id="mat-num">0/0</div>
    <div class="progress-bar"><div class="progress-fill" id="mat-bar" style="width:0%"></div></div>
  </div>
  <div class="score-box clk">
    <div class="label">🕐 Clock</div>
    <div class="num" id="clk-num">0/0</div>
    <div class="progress-bar"><div class="progress-fill" id="clk-bar" style="width:0%"></div></div>
  </div>
  <div class="score-box tot">
    <div class="label">🏆 Total</div>
    <div class="num" id="tot-num">0/0</div>
    <div class="progress-bar"><div class="progress-fill" id="tot-bar" style="width:0%"></div></div>
  </div>
</div>

<div class="filter-tabs">
  <button class="ftab active" onclick="setFilter('all')">All</button>
  <button class="ftab" onclick="setFilter('wrong')">❌ Wrong only</button>
  <button class="ftab" onclick="setFilter('correct')">✅ Correct only</button>
</div>

<div id="answers-section">
  <div class="empty" id="empty-msg">⏳ Waiting for your child to start answering...</div>
  <div id="answers-list"></div>
</div>
<div id="last-updated"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyDR4BXnPh1ZJVgE3SVdH7_Pk6YgeXg1U",
  authDomain:"school-work-4f82e.firebaseapp.com",
  projectId:"school-work-4f82e",
  storageBucket:"school-work-4f82e.firebasestorage.app",
  messagingSenderId:"919583642",
  appId:"1:919583642:web:475f37fe17ead63223a35e3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentFilter = 'all';
window.setFilter = function(f) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  if(latestData) renderAnswers(latestData);
};

let latestData = null;

onSnapshot(doc(db, 'schoolResults', 'live'), (snap) => {
  const statusBar = document.getElementById('status-bar');
  if (!snap.exists()) {
    statusBar.textContent = '🟡 Connected — waiting for child to start...';
    statusBar.style.color = '#FF9F43';
    return;
  }
  statusBar.innerHTML = '<span style="color:#6BCB77">🟢 LIVE</span> — updating in real time';
  statusBar.style.color = '#2C3E50';
  latestData = snap.data();
  renderAll(latestData);
}, (err) => {
  document.getElementById('status-bar').textContent = '🔴 Connection error: ' + err.message;
  document.getElementById('status-bar').style.color = '#FF4757';
});

function renderAll(data) {
  const sc = data.scores || {};
  const e = sc.e || sc.english || {c:0,t:0};
  const m = sc.m || sc.maths || {c:0,t:0};
  const cl = sc.cl || sc.clock || {c:0,t:0};
  const totC = e.c+m.c+cl.c, totT = e.t+m.t+cl.t;

  document.getElementById('eng-num').textContent = e.c+'/'+e.t;
  document.getElementById('mat-num').textContent = m.c+'/'+m.t;
  document.getElementById('clk-num').textContent = cl.c+'/'+cl.t;
  document.getElementById('tot-num').textContent = totC+'/'+totT;

  document.getElementById('eng-bar').style.width = (e.t?Math.round(e.c/e.t*100):0)+'%';
  document.getElementById('mat-bar').style.width = (m.t?Math.round(m.c/m.t*100):0)+'%';
  document.getElementById('clk-bar').style.width = (cl.t?Math.round(cl.c/cl.t*100):0)+'%';
  document.getElementById('tot-bar').style.width = (totT?Math.round(totC/totT*100):0)+'%';

  const updated = data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString() : '';
  document.getElementById('last-updated').textContent = updated ? 'Last updated: ' + updated : '';

  renderAnswers(data);
}

function renderAnswers(data) {
  const ua = data.userAnswers || {};
  const list = document.getElementById('answers-list');
  const emptyMsg = document.getElementById('empty-msg');
  list.innerHTML = '';

  const allAnswers = Object.entries(ua);
  if(allAnswers.length === 0){
    emptyMsg.style.display='block';
    return;
  }
  emptyMsg.style.display='none';

  // Group by section
  const sections = {
    english: {label:'📖 English', color:'#FF6B9D', items:[]},
    maths:   {label:'🔢 Maths',   color:'#4D96FF', items:[]},
    clock:   {label:'🕐 Clock',   color:'#6BCB77', items:[]}
  };

  allAnswers.forEach(([qid, ans]) => {
    const sec = qid.startsWith('eq')?'english':qid.startsWith('mq')?'maths':'clock';
    if(sections[sec]) sections[sec].items.push({qid, ans});
  });

  Object.values(sections).forEach(sec => {
    const filtered = sec.items.filter(({ans}) => {
      if(currentFilter==='wrong') return !ans.isOk;
      if(currentFilter==='correct') return ans.isOk;
      return true;
    });
    if(filtered.length===0) return;

    const head = document.createElement('div');
    head.className='section-head'; head.style.color=sec.color;
    head.textContent = sec.label + ' — ' + filtered.length + ' answered';
    list.appendChild(head);

    // Sort by question number
    filtered.sort((a,b)=>{
      const na=parseInt(a.qid.replace(/[a-z]/g,'')), nb=parseInt(b.qid.replace(/[a-z]/g,''));
      return na-nb;
    });

    filtered.forEach(({qid, ans}) => {
      const num = parseInt(qid.replace(/[a-z]/g,''));
      const card = document.createElement('div');
      card.className = 'a-card ' + (ans.isOk?'correct':'wrong');
      card.innerHTML = `
        <div class="a-icon">${ans.isOk?'✅':'❌'}</div>
        <div class="a-body">
          <div class="a-label">Q${num} · ${ans.cat||''}</div>
          <div class="a-q">${ans.question||''}</div>
          <div class="a-ans">Answer: <span>${ans.given}</span>${!ans.isOk?' → Correct: <span style="color:#1A7F37">'+ans.correct+'</span>':''}</div>
        </div>`;
      list.appendChild(card);
    });
  });
}
</script>
</body>
</html>
