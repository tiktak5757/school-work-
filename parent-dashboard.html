<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Dashboard - Live</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#F0F4FF;color:#2C3E50;min-height:100vh;}
header{background:linear-gradient(135deg,#11998e,#38ef7d);color:white;padding:18px 16px;text-align:center;}
header h1{font-family:'Fredoka One',cursive;font-size:1.6rem;}
header p{font-size:.85rem;opacity:.9;margin-top:3px;}
.live-dot{display:inline-block;width:11px;height:11px;background:#fff;border-radius:50%;margin-right:6px;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
#status-bar{background:white;padding:9px 16px;text-align:center;font-weight:800;font-size:.85rem;border-bottom:3px solid #EEE;color:#667eea;}

.tabs{display:flex;background:white;border-bottom:3px solid #EEE;overflow-x:auto;}
.tb{flex:1;min-width:90px;padding:12px 6px;border:none;background:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;color:#999;border-bottom:4px solid transparent;white-space:nowrap;}
.tb.active{color:#667eea;border-bottom-color:#667eea;}
.pg{display:none;max-width:800px;margin:0 auto;padding:16px;}
.pg.active{display:block;}

.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px;}
.score-box{background:white;border-radius:14px;padding:16px 8px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.08);}
.score-box .label{font-size:.72rem;font-weight:800;opacity:.5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.score-box .num{font-family:'Fredoka One',cursive;font-size:1.6rem;}
.score-box.eng{border-top:5px solid #FF6B9D;}
.score-box.mat{border-top:5px solid #4D96FF;}
.score-box.clk{border-top:5px solid #6BCB77;}
.score-box.tot{border-top:5px solid #764ba2;}
.progress-bar{height:8px;background:#EEE;border-radius:10px;margin-top:6px;overflow:hidden;}
.progress-fill{height:100%;border-radius:10px;transition:width .5s;}
.eng .progress-fill{background:#FF6B9D;}
.mat .progress-fill{background:#4D96FF;}
.clk .progress-fill{background:#6BCB77;}
.tot .progress-fill{background:#764ba2;}

.section-head{font-family:'Fredoka One',cursive;font-size:1.2rem;margin:18px 0 10px;padding-bottom:6px;border-bottom:3px solid #EEE;}
.a-card{background:white;border-radius:10px;padding:13px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:5px solid #ddd;display:flex;align-items:flex-start;gap:11px;}
.a-card.correct{border-left-color:#6BCB77;background:#F0FFF4;}
.a-card.wrong{border-left-color:#FF4757;background:#FFF5F5;}
.a-icon{font-size:1.3rem;min-width:26px;}
.a-body{flex:1;}
.a-label{font-size:.65rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:.4;margin-bottom:3px;}
.a-q{font-weight:700;font-size:.88rem;margin-bottom:4px;}
.a-ans{font-size:.85rem;}
.a-ans span{font-weight:800;}
.empty{text-align:center;padding:36px;color:#aaa;font-weight:700;}
#last-updated{text-align:center;font-size:.78rem;color:#aaa;padding:10px;font-weight:700;}
.filter-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.ftab{padding:7px 14px;border-radius:50px;border:2px solid #ddd;background:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;cursor:pointer;}
.ftab.active{background:#667eea;color:white;border-color:#667eea;}

/* Weekly progress page */
.week-card{background:white;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);}
.week-card .wk-label{font-weight:800;font-size:.85rem;opacity:.6;margin-bottom:6px;}
.week-card .wk-score{font-family:'Fredoka One',cursive;font-size:1.6rem;color:#667eea;}
.week-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.week-bar-label{min-width:90px;font-size:.8rem;font-weight:800;}
.week-bar-track{flex:1;height:22px;background:#EEE;border-radius:11px;overflow:hidden;position:relative;}
.week-bar-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:11px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;transition:width .6s;}
.week-bar-fill span{color:white;font-size:.72rem;font-weight:800;}
.trend-badge{display:inline-block;padding:4px 12px;border-radius:50px;font-size:.78rem;font-weight:800;margin-left:8px;}
.trend-up{background:#D4EDDA;color:#155724;}
.trend-down{background:#F8D7DA;color:#721C24;}
.trend-same{background:#FFF3CD;color:#856404;}

/* Weak topics page */
.topic-card{background:white;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.topic-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.topic-name{font-weight:800;font-size:.92rem;}
.topic-pct{font-family:'Fredoka One',cursive;font-size:1.1rem;}
.topic-bar-track{height:12px;background:#EEE;border-radius:10px;overflow:hidden;}
.topic-bar-fill{height:100%;border-radius:10px;transition:width .6s;}
.topic-meta{font-size:.78rem;color:#999;font-weight:700;margin-top:6px;}
.focus-banner{background:linear-gradient(135deg,#FF6B9D,#FF4757);color:white;border-radius:14px;padding:16px;margin-bottom:16px;}
.focus-banner h3{font-family:'Fredoka One',cursive;font-size:1.1rem;margin-bottom:6px;}
.focus-banner p{font-size:.85rem;font-weight:700;opacity:.95;}
</style>
</head>
<body>
<header>
  <h1><span class="live-dot"></span>Parent Dashboard</h1>
  <p>Live answers, weekly progress and weak topics</p>
</header>
<div id="status-bar">Connecting to Firebase...</div>

<div class="tabs">
  <button class="tb active" onclick="goTab('live')">Live Now</button>
  <button class="tb" onclick="goTab('week')">Weekly Progress</button>
  <button class="tb" onclick="goTab('weak')">Weak Topics</button>
</div>

<!-- ===== LIVE TAB ===== -->
<div id="live" class="pg active">
  <div class="score-grid">
    <div class="score-box eng">
      <div class="label">English</div>
      <div class="num" id="eng-num">0/0</div>
      <div class="progress-bar"><div class="progress-fill" id="eng-bar" style="width:0%"></div></div>
    </div>
    <div class="score-box mat">
      <div class="label">Maths</div>
      <div class="num" id="mat-num">0/0</div>
      <div class="progress-bar"><div class="progress-fill" id="mat-bar" style="width:0%"></div></div>
    </div>
    <div class="score-box clk">
      <div class="label">Clock</div>
      <div class="num" id="clk-num">0/0</div>
      <div class="progress-bar"><div class="progress-fill" id="clk-bar" style="width:0%"></div></div>
    </div>
    <div class="score-box tot">
      <div class="label">Total</div>
      <div class="num" id="tot-num">0/0</div>
      <div class="progress-bar"><div class="progress-fill" id="tot-bar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter('all')">All</button>
    <button class="ftab" onclick="setFilter('wrong')">Wrong only</button>
    <button class="ftab" onclick="setFilter('correct')">Correct only</button>
  </div>

  <div id="answers-section">
    <div class="empty" id="empty-msg">Waiting for your child to start answering...</div>
    <div id="answers-list"></div>
  </div>
  <div id="last-updated"></div>
</div>

<!-- ===== WEEKLY PROGRESS TAB ===== -->
<div id="week" class="pg">
  <div id="week-content">
    <div class="empty">Loading weekly history...</div>
  </div>
</div>

<!-- ===== WEAK TOPICS TAB ===== -->
<div id="weak" class="pg">
  <div id="weak-content">
    <div class="empty">Loading topic breakdown...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, onSnapshot, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyDR4BXnPh1ZJVgE3SVdH7_Pk6YgeXg1U",
  authDomain:"school-work-4f82e.firebaseapp.com",
  projectId:"school-work-4f82e",
  storageBucket:"school-work-4f82e.firebasestorage.app",
  messagingSenderId:"919583642",
  appId:"1:919583642:web:475f37fe17ead63223a35e3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== TABS =====
window.goTab = function(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
  if(id==='week') loadWeekly();
  if(id==='weak') loadWeakTopics();
};

let currentFilter = 'all';
window.setFilter = function(f) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  if(latestData) renderAnswers(latestData);
};

let latestData = null;

// ===== LIVE LISTENER =====
onSnapshot(doc(db, 'schoolResults', 'live'), (snap) => {
  const statusBar = document.getElementById('status-bar');
  if (!snap.exists()) {
    statusBar.textContent = 'Connected - waiting for child to start...';
    statusBar.style.color = '#FF9F43';
    return;
  }
  statusBar.innerHTML = '<span style="color:#6BCB77">LIVE</span> - updating in real time';
  statusBar.style.color = '#2C3E50';
  latestData = snap.data();
  renderAll(latestData);
}, (err) => {
  document.getElementById('status-bar').textContent = 'Connection error: ' + err.message;
  document.getElementById('status-bar').style.color = '#FF4757';
});

function renderAll(data) {
  const sc = data.scores || {};
  const e = sc.e || {c:0,t:0};
  const m = sc.m || {c:0,t:0};
  const cl = sc.cl || {c:0,t:0};
  const totC = e.c+m.c+cl.c, totT = e.t+m.t+cl.t;

  document.getElementById('eng-num').textContent = e.c+'/'+e.t;
  document.getElementById('mat-num').textContent = m.c+'/'+m.t;
  document.getElementById('clk-num').textContent = cl.c+'/'+cl.t;
  document.getElementById('tot-num').textContent = totC+'/'+totT;

  document.getElementById('eng-bar').style.width = (e.t?Math.round(e.c/e.t*100):0)+'%';
  document.getElementById('mat-bar').style.width = (m.t?Math.round(m.c/m.t*100):0)+'%';
  document.getElementById('clk-bar').style.width = (cl.t?Math.round(cl.c/cl.t*100):0)+'%';
  document.getElementById('tot-bar').style.width = (totT?Math.round(totC/totT*100):0)+'%';

  const updated = data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString() : '';
  document.getElementById('last-updated').textContent = updated ? 'Last updated: ' + updated : '';

  renderAnswers(data);
}

function realCorrect(ans){
  // school-work.html stores 'ok'; fall back to isOk; double check via string match
  if(typeof ans.ok === 'boolean') return ans.ok;
  if(typeof ans.isOk === 'boolean') return ans.isOk;
  const gc=(ans.given||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  const cc=(ans.correct||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  return gc===cc;
}

function renderAnswers(data) {
  const ua = data.userAnswers || {};
  const list = document.getElementById('answers-list');
  const emptyMsg = document.getElementById('empty-msg');
  list.innerHTML = '';

  const allAnswers = Object.entries(ua);
  if(allAnswers.length === 0){
    emptyMsg.style.display='block';
    return;
  }
  emptyMsg.style.display='none';

  const sections = {
    english: {label:'English', color:'#FF6B9D', items:[]},
    maths:   {label:'Maths',   color:'#4D96FF', items:[]},
    clock:   {label:'Clock',   color:'#6BCB77', items:[]}
  };

  allAnswers.forEach(([qid, ans]) => {
    const sec = qid.startsWith('eq')?'english':qid.startsWith('mq')?'maths':'clock';
    if(sections[sec]) sections[sec].items.push({qid, ans});
  });

  Object.values(sections).forEach(sec => {
    const filtered = sec.items.filter(({ans}) => {
      const ok = realCorrect(ans);
      if(currentFilter==='wrong') return !ok;
      if(currentFilter==='correct') return ok;
      return true;
    });
    if(filtered.length===0) return;

    const head = document.createElement('div');
    head.className='section-head'; head.style.color=sec.color;
    head.textContent = sec.label + ' - ' + filtered.length + ' answered';
    list.appendChild(head);

    filtered.sort((a,b)=>{
      const na=parseInt(a.qid.replace(/[a-z]/g,'')), nb=parseInt(b.qid.replace(/[a-z]/g,''));
      return na-nb;
    });

    filtered.forEach(({qid, ans}) => {
      const num = parseInt(qid.replace(/[a-z]/g,''));
      const card = document.createElement('div');
      const ok = realCorrect(ans);
      const question = ans.q || ans.question || '';
      card.className = 'a-card ' + (ok?'correct':'wrong');
      card.innerHTML = `
        <div class="a-icon">${ok?'✅':'❌'}</div>
        <div class="a-body">
          <div class="a-label">Q${num} - ${ans.cat||''}</div>
          <div class="a-q">${question}</div>
          <div class="a-ans">Answer: <span>${ans.given}</span>${!ok?' &rarr; Correct: <span style="color:#1A7F37">'+ans.correct+'</span>':''}</div>
        </div>`;
      list.appendChild(card);
    });
  });
}

// ===== WEEKLY PROGRESS =====
function getWeekKey(d){
  var date = new Date(d.getTime());
  date.setHours(0,0,0,0);
  date.setDate(date.getDate()+3-((date.getDay()+6)%7));
  var week1 = new Date(date.getFullYear(),0,4);
  var weekNo = 1+Math.round(((date.getTime()-week1.getTime())/86400000-3+((week1.getDay()+6)%7))/7);
  return date.getFullYear()+'-W'+String(weekNo).padStart(2,'0');
}

async function loadWeekly(){
  const container = document.getElementById('week-content');
  container.innerHTML = '<div class="empty">Loading weekly history...</div>';
  try {
    const snap = await getDocs(collection(db, 'schoolHistory'));
    const weeks = [];
    snap.forEach(d => weeks.push(d.data()));
    weeks.sort((a,b) => (a.weekKey||'').localeCompare(b.weekKey||''));

    if(weeks.length === 0){
      container.innerHTML = '<div class="empty">No weekly data yet. Once your child answers questions across different weeks, progress will show here.</div>';
      return;
    }

    let html = '';
    const maxPct = Math.max(...weeks.map(w => w.scoreTotal ? Math.round(w.scoreCorrect/w.scoreTotal*100) : 0), 10);

    weeks.forEach((w, i) => {
      const pct = w.scoreTotal ? Math.round(w.scoreCorrect/w.scoreTotal*100) : 0;
      const barWidth = Math.max(8, Math.round(pct/maxPct*100));
      let trendHtml = '';
      if(i > 0){
        const prevPct = weeks[i-1].scoreTotal ? Math.round(weeks[i-1].scoreCorrect/weeks[i-1].scoreTotal*100) : 0;
        if(pct > prevPct) trendHtml = '<span class="trend-badge trend-up">Up ' + (pct-prevPct) + '%</span>';
        else if(pct < prevPct) trendHtml = '<span class="trend-badge trend-down">Down ' + (prevPct-pct) + '%</span>';
        else trendHtml = '<span class="trend-badge trend-same">Same</span>';
      }
      html += '<div class="week-card">' +
        '<div class="wk-label">' + (w.weekKey||'Week') + trendHtml + '</div>' +
        '<div class="wk-score">' + pct + '% &nbsp; (' + w.scoreCorrect + '/' + w.scoreTotal + ')</div>' +
        '<div style="display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;font-size:.82rem;font-weight:700;color:#666;">' +
          '<span>English: ' + ((w.english&&w.english.c)||0) + '/' + ((w.english&&w.english.t)||0) + '</span>' +
          '<span>Maths: ' + ((w.maths&&w.maths.c)||0) + '/' + ((w.maths&&w.maths.t)||0) + '</span>' +
          '<span>Clock: ' + ((w.clock&&w.clock.c)||0) + '/' + ((w.clock&&w.clock.t)||0) + '</span>' +
        '</div>' +
        '<div class="week-bar-track" style="margin-top:10px;">' +
          '<div class="week-bar-fill" style="width:' + barWidth + '%"><span>' + pct + '%</span></div>' +
        '</div>' +
      '</div>';
    });

    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<div class="empty">Could not load weekly history: ' + e.message + '</div>';
  }
}

// ===== WEAK TOPICS =====
async function loadWeakTopics(){
  const container = document.getElementById('weak-content');
  container.innerHTML = '<div class="empty">Loading topic breakdown...</div>';
  try {
    // Get live category stats (current set) plus merge with all weekly history
    const liveSnapPromise = new Promise((resolve) => {
      onSnapshot(doc(db,'schoolResults','live'), (s)=>{ resolve(s.exists()?s.data():null); }, ()=>resolve(null));
    });

    const histSnap = await getDocs(collection(db, 'schoolHistory'));
    const merged = {};

    histSnap.forEach(d => {
      const data = d.data();
      const cats = data.categoryStats || {};
      Object.keys(cats).forEach(cat => {
        if(!merged[cat]) merged[cat] = {c:0,t:0};
        merged[cat].c = Math.max(merged[cat].c, cats[cat].c);
        merged[cat].t = Math.max(merged[cat].t, cats[cat].t);
      });
    });

    // Also pull current live data category stats once
    const liveData = await new Promise((resolve) => {
      const unsub = onSnapshot(doc(db,'schoolResults','live'), (s)=>{
        unsub();
        resolve(s.exists()?s.data():null);
      });
    });

    if(liveData && liveData.categoryStats){
      Object.keys(liveData.categoryStats).forEach(cat => {
        if(!merged[cat]) merged[cat] = {c:0,t:0};
        const cu = liveData.categoryStats[cat];
        merged[cat].c = Math.max(merged[cat].c, cu.c);
        merged[cat].t = Math.max(merged[cat].t, cu.t);
      });
    }

    const cats = Object.entries(merged)
      .filter(([cat, s]) => s.t >= 2) // ignore tiny samples
      .map(([cat, s]) => ({cat, c:s.c, t:s.t, pct: Math.round(s.c/s.t*100)}))
      .sort((a,b) => a.pct - b.pct);

    if(cats.length === 0){
      container.innerHTML = '<div class="empty">Not enough data yet to identify weak topics. Once your child answers more questions, this will show which topics need practice.</div>';
      return;
    }

    const weakest = cats.filter(c => c.pct < 60).slice(0, 5);
    let html = '';

    if(weakest.length > 0){
      html += '<div class="focus-banner"><h3>Focus Areas</h3><p>These topics need the most practice: ' +
        weakest.map(c => c.cat + ' (' + c.pct + '%)').join(', ') + '</p></div>';
    } else {
      html += '<div class="focus-banner" style="background:linear-gradient(135deg,#11998e,#38ef7d);"><h3>Great Progress!</h3><p>No major weak areas found - your child is doing well across all topics.</p></div>';
    }

    cats.forEach(c => {
      let color = '#6BCB77';
      if(c.pct < 50) color = '#FF4757';
      else if(c.pct < 75) color = '#FF9F43';
      html += '<div class="topic-card">' +
        '<div class="topic-row"><div class="topic-name">' + c.cat + '</div><div class="topic-pct" style="color:' + color + '">' + c.pct + '%</div></div>' +
        '<div class="topic-bar-track"><div class="topic-bar-fill" style="width:' + c.pct + '%;background:' + color + ';"></div></div>' +
        '<div class="topic-meta">' + c.c + ' correct out of ' + c.t + ' answered</div>' +
      '</div>';
    });

    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<div class="empty">Could not load topic data: ' + e.message + '</div>';
  }
}
</script>
</body>
</html>
